<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Notes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <h1>BigQuery Release Notes</h1>
                <div class="header-actions">
                    <button id="theme-toggle" class="theme-toggle-btn" title="Toggle Light/Dark Mode" aria-label="Toggle Theme"></button>
                    <button id="export-csv-btn" class="btn secondary" disabled aria-label="Export to CSV">
                        <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        Export CSV
                    </button>
                    <button id="refresh-btn" class="btn primary" aria-label="Refresh Data">
                        <span class="btn-text">Refresh</span>
                        <span class="spinner hidden"></span>
                    </button>
                </div>
            </div>
        </header>

        <main>
            <div class="controls-bar hidden" id="controls-bar">
                <div class="search-container">
                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="search-input" placeholder="Search by title or content..." aria-label="Search release notes">
                </div>
            </div>

            <div id="error-message" class="error-banner hidden">
                <span id="error-text"></span>
                <button id="retry-btn" class="btn secondary small">Retry</button>
            </div>
            
            <div id="loading-state" class="loading-state hidden">
                <div class="main-spinner"></div>
                <p>Loading release notes...</p>
            </div>

            <div id="empty-state" class="empty-state hidden">
                <svg class="empty-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                <h3>No updates found</h3>
                <p>We couldn't find any release notes matching your search.</p>
            </div>

            <div id="notes-container" class="notes-grid">
                <!-- Notes will be injected here -->
            </div>
        </main>
    </div>

    <!-- Scroll to Top Button -->
    <button id="scroll-to-top" class="scroll-to-top hidden" aria-label="Scroll to top" title="Scroll to top">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
    </button>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden">Copied to clipboard!</div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
